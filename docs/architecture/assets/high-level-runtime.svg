<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Operance high-level runtime architecture</title>
  <desc id="desc">User intent enters Operance through CLI, tray, voice loop, or MCP, becomes a typed action in the portable core, passes through platform provider readiness, executes through OS adapters, and records runtime state.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0fdfa"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="core" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f766e" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .label{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .muted{fill:#4b5563}
      .small{font-size:20px}
      .tiny{font-size:16px}
      .title{font-size:28px;font-weight:800}
      .card{fill:#fff;stroke:#d1d5db;stroke-width:2;filter:url(#shadow)}
      .soft{fill:#f9fafb;stroke:#e5e7eb;stroke-width:2}
      .teal{fill:url(#core)}
      .white{fill:#fff}
      .arrow{stroke:#0f766e;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .dash{stroke-dasharray:9 9}
    </style>
  </defs>

  <rect width="1280" height="520" rx="36" fill="url(#bg)"/>
  <circle cx="1180" cy="82" r="130" fill="#5eead4" opacity="0.22"/>
  <circle cx="96" cy="456" r="170" fill="#14b8a6" opacity="0.12"/>

  <text x="64" y="70" class="label title">Operance turns intent into safe desktop action</text>
  <text x="64" y="103" class="label muted small">The core stays portable. Providers and adapters own host-specific readiness and execution.</text>

  <rect x="70" y="180" width="180" height="120" rx="28" class="card"/>
  <text x="160" y="222" text-anchor="middle" class="label title">Intent</text>
  <text x="160" y="255" text-anchor="middle" class="label muted small">speak or type</text>
  <text x="160" y="282" text-anchor="middle" class="label muted tiny">"open browser"</text>

  <rect x="310" y="156" width="210" height="168" rx="30" class="soft"/>
  <text x="415" y="197" text-anchor="middle" class="label title">Input</text>
  <text x="415" y="232" text-anchor="middle" class="label muted small">CLI</text>
  <text x="415" y="260" text-anchor="middle" class="label muted small">Tray + voice</text>
  <text x="415" y="288" text-anchor="middle" class="label muted small">MCP</text>

  <rect x="585" y="135" width="260" height="210" rx="38" class="teal" filter="url(#shadow)"/>
  <text x="715" y="183" text-anchor="middle" class="label white title">Portable core</text>
  <text x="715" y="224" text-anchor="middle" class="label white small">typed action schema</text>
  <text x="715" y="254" text-anchor="middle" class="label white small">planner + validation</text>
  <text x="715" y="284" text-anchor="middle" class="label white small">policy + confirmation</text>
  <text x="715" y="314" text-anchor="middle" class="label white small">executor + MCP</text>

  <rect x="910" y="156" width="210" height="168" rx="30" class="soft"/>
  <text x="1015" y="197" text-anchor="middle" class="label title">Provider</text>
  <text x="1015" y="232" text-anchor="middle" class="label muted small">host readiness</text>
  <text x="1015" y="260" text-anchor="middle" class="label muted small">setup guidance</text>
  <text x="1015" y="288" text-anchor="middle" class="label muted small">verified tools</text>

  <rect x="920" y="390" width="220" height="74" rx="22" class="card"/>
  <text x="1030" y="421" text-anchor="middle" class="label small">Runtime state</text>
  <text x="1030" y="448" text-anchor="middle" class="label muted tiny">audit, status, support bundle</text>

  <rect x="1168" y="180" width="42" height="42" rx="10" fill="#14b8a6"/>
  <rect x="1145" y="238" width="88" height="52" rx="14" class="card"/>
  <text x="1189" y="330" text-anchor="middle" class="label title">OS</text>
  <text x="1189" y="360" text-anchor="middle" class="label muted small">adapter</text>

  <path d="M250 240 H297" class="arrow"/>
  <path d="M520 240 H572" class="arrow"/>
  <path d="M845 240 H897" class="arrow"/>
  <path d="M1120 240 H1146" class="arrow"/>
  <path d="M825 331 C875 392 900 426 908 426" class="arrow dash"/>

  <g transform="translate(70 386)">
    <rect width="640" height="66" rx="20" fill="#fff" stroke="#ccfbf1" stroke-width="2"/>
    <text x="24" y="30" class="label tiny" font-weight="800">Safety invariant</text>
    <text x="24" y="52" class="label muted tiny">Models may suggest intent, but only validated typed actions reach adapters.</text>
  </g>
</svg>
